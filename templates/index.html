<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes Pro</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: white;
            padding: 10px;
        }

        /* TOP BAR */
        .bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        input, button, select {
            padding: 8px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
            font-weight: bold;
        }

        /* BOARD */
        .board {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* NOTE */
        .note {
            width: 180px;
            min-height: 150px;
            position: absolute;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            cursor: grab;
            animation: pop 0.2s ease;
        }

        .note:active {
            cursor: grabbing;
        }

        textarea {
            width: 100%;
            height: 100px;
            border: none;
            background: transparent;
            outline: none;
            resize: none;
            font-size: 14px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .btn {
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

    </style>
</head>

<body>

<h1>🌈 Sticky Notes Pro</h1>

<div class="bar">
    <input id="text" placeholder="New note">
    <input type="color" id="color" value="#fff59d">
    <button onclick="createNote()">Add</button>
</div>

<div class="board" id="board">

{% for n in notes %}
<div class="note"
     data-id="{{ n.id }}"
     style="left:{{ n.x }}px; top:{{ n.y }}px; background:{{ n.color }}">

    <textarea oninput="updateNote({{ n.id }}, this.value)">{{ n.content }}</textarea>

    <div class="actions">
        <span class="btn" onclick="deleteNote({{ n.id }})">🗑</span>
    </div>

</div>
{% endfor %}

</div>

<script>

// CREATE NOTE
function createNote() {
    fetch("/create", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            content: document.getElementById("text").value,
            color: document.getElementById("color").value
        })
    }).then(() => location.reload());
}

// UPDATE NOTE
function updateNote(id, content) {
    fetch("/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id, content})
    });
}

// DELETE NOTE
function deleteNote(id) {
    fetch("/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id})
    }).then(() => location.reload());
}

// DRAG SYSTEM
let dragged = null;
let offsetX = 0;
let offsetY = 0;

document.querySelectorAll(".note").forEach(note => {

    note.onmousedown = (e) => {
        dragged = note;

        offsetX = e.clientX - note.offsetLeft;
        offsetY = e.clientY - note.offsetTop;

        document.onmousemove = move;
        document.onmouseup = stop;
    };

});

function move(e) {
    if (!dragged) return;

    dragged.style.left = (e.clientX - offsetX) + "px";
    dragged.style.top = (e.clientY - offsetY) + "px";
}

function stop() {
    if (!dragged) return;

    fetch("/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id: parseInt(dragged.dataset.id),
            x: parseInt(dragged.style.left),
            y: parseInt(dragged.style.top)
        })
    });

    dragged = null;
    document.onmousemove = null;
    document.onmouseup = null;
}

</script>

</body>
</html>
